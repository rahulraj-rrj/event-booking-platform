spring.application.name=event-booking-backend

# Set by Render: a TiDB Cloud connection string, e.g.
# jdbc:mysql://gateway01.us-east-1.prod.aws.tidbcloud.com:4000/event_booking?sslMode=VERIFY_IDENTITY&enabledTLSProtocols=TLSv1.2,TLSv1.3
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.TiDBDialect
spring.jpa.show-sql=false

# Render assigns a dynamic port via the PORT env var - the app must bind to it
server.port=${PORT:8080}

jwt.secret=${JWT_SECRET}
jwt.access-token-expiration-ms=${JWT_ACCESS_EXP:900000}
jwt.refresh-token-expiration-ms=${JWT_REFRESH_EXP:604800000}

# Set this once the frontend is deployed, e.g. https://your-app.vercel.app
app.cors.allowed-origins=${FRONTEND_URL}
